<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC PRO PANEL xd3-s1.1.1</title>

<style>
body{
    margin:0;
    background:#07111c;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}
.container{
    max-width:420px;
    margin:auto;
    padding:15px;
}
.card{
    background:#101d2f;
    border-radius:15px;
    padding:15px;
    margin-bottom:12px;
}
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}
.box{
    background:#0d1828;
    padding:12px;
    border-radius:12px;
    text-align:center;
}
.price{
    font-size:32px;
    font-weight:bold;
}
.tabs button{
    padding:10px;
    margin:5px;
    border-radius:20px;
    border:none;
    background:#0d1828;
    color:white;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
    <h2>BTC PRO PANEL xd3-s1.1.1</h2>
    <div class="price" id="livePrice">$...</div>
    <div id="liveChange">...</div>
</div>

<div class="card grid">
    <div class="box">Spot<br><span id="spotPrice">-</span></div>
    <div class="box">Futures<br><span id="futuresPrice">-</span></div>
    <div class="box">Basis<br><span id="basisValue">-</span></div>
    <div class="box">Funding<br><span id="fundingValue">-</span></div>
    <div class="box">OI<br><span id="oiValue">-</span></div>
    <div class="box">Index<br><span id="indexPriceBox">-</span></div>
</div>

</div>

<script>
let spotWS;
let futuresWS;
let currentSpotPrice = null;
let currentFuturesPrice = null;

function fmtUsd(n){
    return "$" + Number(n).toLocaleString("en-US",{maximumFractionDigits:2});
}

function connectSpot(){
    if(spotWS) spotWS.close();

    spotWS = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");

    spotWS.onmessage = (e)=>{
        const data = JSON.parse(e.data);
        const price = Number(data.p);
        currentSpotPrice = price;

        document.getElementById("livePrice").innerText = fmtUsd(price);
        document.getElementById("spotPrice").innerText = fmtUsd(price);

        updateBasis();
    };

    spotWS.onclose = ()=>{
        setTimeout(connectSpot,3000);
    };
}

function connectFutures(){
    if(futuresWS) futuresWS.close();

    futuresWS = new WebSocket("wss://fstream.binance.com/ws/btcusdt@markPrice");

    futuresWS.onmessage = (e)=>{
        const data = JSON.parse(e.data);

        const markPrice = Number(data.p);
        currentFuturesPrice = markPrice;

        document.getElementById("futuresPrice").innerText = fmtUsd(markPrice);
        document.getElementById("indexPriceBox").innerText = fmtUsd(data.i);

        const funding = Number(data.r) * 100;
        document.getElementById("fundingValue").innerText = funding.toFixed(4) + "%";

        updateBasis();
    };

    futuresWS.onclose = ()=>{
        setTimeout(connectFutures,3000);
    };
}

function updateBasis(){
    if(currentSpotPrice && currentFuturesPrice){
        const basis = currentFuturesPrice - currentSpotPrice;
        document.getElementById("basisValue").innerText = basis.toFixed(2);
    }
}

async function loadOI(){
    try{
        const r = await fetch("https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT");
        const d = await r.json();
        document.getElementById("oiValue").innerText = (Number(d.openInterest)/1000).toFixed(2)+"K";
    }catch{}
}

connectSpot();
connectFutures();
loadOI();
setInterval(loadOI,60000);
</script>

</body>
</html>
